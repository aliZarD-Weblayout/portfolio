<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TODO</title>
	<link 
		rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
		integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" 
		crossorigin="anonymous">
	<script type="module">
		import { createTodoApp } from './todo-app/view.js';
		import { 
			getTodoList,
			createTodoItem,
			switchTodoItemDone,
			deleteTodoItem
		} from './todo-app/api.js'; 
		import { localStorage } from './LocalStorage.js'
		const owner = 'Я';
		(async () => {
			const todoList = await getTodoList(owner);
			createTodoApp(document.getElementById('todo-app'), {
				title: 'Local Storage',
				owner,
				todoList, 
    			onCreateFormSubmit: createTodoItem,
				onDoneClick: switchTodoItemDone,
				onDeleteClick: deleteTodoItem,
			});
		})();
	</script>
</head>
<body>
	<div class="container mb-5">
		<nav class="nav">
			<button class="server-btn">Server</button>
			<button class="local-btn">Local</button>
		</nav>
	</div>
	<div class="container" id="todo-app"></div>
</body>
</html>
