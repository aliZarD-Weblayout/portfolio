<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="top" class="accordion-container">
		<button class="accordion">Section 1</button>
		<div class="panel">
			<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptates voluptas voluptatum, consequuntur quod cumque cupiditate vero ea, natus optio explicabo ab. Dolorem similique aut accusantium earum maiores enim voluptate minima.</p>
		</div>
	</div>
	<div class="input-container">
		<form novalidate="novalidate" class="form">
			<input id="name" placeholder="Имя" type="text" class="inputs">
			<input id="surname" placeholder="Фамилия" type="text" class="inputs">
			<input id="fullname" placeholder="Отчество" type="text" class="inputs">
		</form>
		<div class="btn-container">
			<button id="btn">
				Нажать
			</button>
		</div>
	</div>
	<div class="scroll-container">
		<button class="fixed-btn" id="scrollbtn">
			Наверх
		</button>
	</div>

	<script src="main.js"></script>
</body>
</html>
